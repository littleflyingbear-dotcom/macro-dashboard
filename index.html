<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Larry 宏观资产仪表盘</title>
  <meta name="description" content="人民币汇率、黄金、风险温度计与资产配置信号仪表盘" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Macro Dashboard</p>
        <h1>Larry 宏观资产仪表盘</h1>
        <p class="subtitle">每日观察：美元、澳元、欧元、日元、国际黄金、人民币金价</p>
      </div>
      <div class="status-card">
        <span id="data-status" class="status-dot"></span>
        <div>
          <div class="muted">数据更新时间</div>
          <div id="updated-at" class="updated-at">加载中...</div>
        </div>
      </div>
    </header>

    <section class="summary-grid" id="cards"></section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>30天趋势</h2>
          <p class="muted">点击图例可隐藏/显示单个指标</p>
        </div>
        <select id="chart-select" class="select">
          <option value="fx">汇率：USD/AUD/EUR/JPY兑人民币</option>
          <option value="gold">黄金：国际金价与人民币金价</option>
        </select>
      </div>
      <canvas id="trendChart" height="120"></canvas>
    </section>

    <section class="dashboard-grid">
      <div class="panel">
        <h2>风险温度计</h2>
        <div id="thermometer" class="thermometer"></div>
      </div>

      <div class="panel">
        <h2>资产配置信号</h2>
        <div id="signals" class="signals"></div>
      </div>
    </section>

    <section class="panel">
      <h2>我的观察框架</h2>
      <div class="logic-grid">
        <div>
          <span class="tag usd">美元</span>
          <p>主要用于对冲中国经济与人民币资产风险，不一定是赌美元升值。</p>
        </div>
        <div>
          <span class="tag aud">澳元</span>
          <p>代表“中国经济复苏 + 大宗商品”的高 Beta 资产，波动大于美元。</p>
        </div>
        <div>
          <span class="tag gold">黄金</span>
          <p>主要用于对冲全球风险、美元信用风险与地缘政治不确定性。</p>
        </div>
      </div>
    </section>

    <footer>
      <p>本页面仅供个人观察与学习，不构成投资建议。汇率和金价可能延迟或与银行成交价存在差异。</p>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
